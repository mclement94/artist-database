<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Edit artwork</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .form {
      max-width: 760px;
    }

    .row {
      margin-bottom: 18px;
    }

    .row.split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 9px 11px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-family: inherit;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
    }

    .image-block img {
      max-width: 260px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .image-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }

    .image-choice {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 120px;
      font-size: 13px;
      text-align: center;
    }

    .image-choice img {
      max-width: 100%;
      max-height: 110px;
      border-radius: 12px;
      border: 1px solid #ddd;
      margin-bottom: 6px;
    }

    .image-choice input {
      margin-bottom: 6px;
    }

    .muted {
      font-size: 13px;
      color: #777;
    }

    .actions {
      display: flex;
      gap: 14px;
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card form">

      <h2>Edit artwork</h2>

      <form method="post" enctype="multipart/form-data">

        <div class="row">
          <label>Title *</label>
          <input name="title" value="{{ artwork.title }}" required>
        </div>

          <div class="row split">
            <div>
              <label>Year</label>
              <input name="year" value="{{ artwork.year }}">
            </div>

            <div>
              <label>Series / Project</label>
              <input name="series" value="{{ artwork.series }}">
            </div>
          </div>

        <div class="row split">
          <div>
            <label>Medium *</label>
            <input name="medium" value="{{ artwork.medium }}" required>
          </div>

          <div>
            <label>Dimensions</label>
            <input name="dimensions" value="{{ artwork.dimensions }}">
          </div>
        </div>

        <div class="row split">
          <div>
            <label>Edition type</label>
            <select name="edition_type">
              <option value="">—</option>
              <option value="Unique" {% if artwork.edition_type == "Unique" %}selected{% endif %}>Unique</option>
              <option value="Editioned" {% if artwork.edition_type == "Editioned" %}selected{% endif %}>Editioned</option>
              <option value="AP" {% if artwork.edition_type == "AP" %}selected{% endif %}>AP</option>
            </select>
          </div>

          <div>
            <label>Edition info</label>
            <input name="edition_info" value="{{ artwork.edition_info }}">
          </div>
        </div>

        <div class="row split">
          <div>
            <label>Status</label>
            <select name="status">
              <option value="working" {% if artwork.status == "working" %}selected{% endif %}>🔵 Working on</option>
              <option value="for_sale" {% if artwork.status == "for_sale" %}selected{% endif %}>🟢 For sale</option>
              <option value="sold" {% if artwork.status == "sold" %}selected{% endif %}>🔴 Sold</option>
            </select>
          </div>

          <div>
            <label>Price</label>
            <input name="price" value="{{ artwork.price }}">
          </div>
        </div>

        <div class="row">
          <label>Description</label>
          <textarea name="description" rows="4">{{ artwork.description }}</textarea>
        </div>

        <div class="row">
          <label>Notes (internal)</label>
          <textarea name="notes" rows="3">{{ artwork.notes }}</textarea>
        </div>

        <div class="row image-block">
          <label>Artwork images</label>

          {% if artwork.images %}
            <div class="image-grid">
              {% for filename in artwork.images %}
                <label class="image-choice">
                  <input type="radio" name="certificate_image_filename" value="{{ filename }}"
                         {% if filename == artwork.certificate_image_filename or (not artwork.certificate_image_filename and loop.first) %}checked{% endif %}>
                  <img src="{{ url_for('artworks.uploaded_file', filename=filename) }}">
                  <span>{% if filename == artwork.certificate_image_filename %}Certificate image{% elif not artwork.certificate_image_filename and loop.first %}Default certificate image{% else %}Use for certificate{% endif %}</span>
                </label>
              {% endfor %}
            </div>
          {% else %}
            <div class="muted">No images uploaded yet.</div>
          {% endif %}

          <div style="margin-top:10px;">
            <input type="file" name="images" accept="image/*" multiple>
            <div class="muted">Upload one or more images; choose the certificate image above.</div>
          </div>
        </div>

        <div class="actions">
          <button class="btn" type="submit">Save changes</button>
          <a class="btn" href="{{ url_for('artworks.artwork_detail', artwork_id=artwork.id) }}">Cancel</a>
        </div>

      </form>

    </div>
  </div>
</body>
</html>
