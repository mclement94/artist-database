version: '3.8'

services:
  app:
    build: .
    container_name: artist-database-app
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./instance:/app/instance
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
    stdin_open: true
    tty: true
